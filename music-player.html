<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>音乐播放器 · Love Story with You</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        html, body { 
            background: transparent !important; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 50px;
            width: 50px;
        }
        body {
            background: transparent !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 主播放器按钮 */
        .music-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #D4B5B5, #E2C5C5);
            border-radius: 50%;
            border: none;
            box-shadow: 0 4px 20px rgba(212, 181, 181, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            color: white;
            line-height: 1;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 10;
        }
        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(212, 181, 181, 0.6);
        }
        .music-btn:active {
            transform: scale(0.95);
            outline: none !important;
            box-shadow: 0 2px 10px rgba(212, 181, 181, 0.4);
        }
        .music-btn.playing {
            background: linear-gradient(135deg, #E2C5C5, #D4B5B5);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 20px rgba(212, 181, 181, 0.5); }
            50% { box-shadow: 0 4px 30px rgba(212, 181, 181, 0.8); }
        }
        .music-btn::-moz-focus-inner {
            border: 0 !important;
            padding: 0 !important;
        }
        .music-btn:focus {
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <button class="music-btn" id="musicBtn" title="点击播放/暂停音乐">🎵</button>

    <audio id="audioPlayer" preload="auto">
        <source src="music/once.mp3" type="audio/mpeg">
    </audio>

    <script>
        let isPlaying = localStorage.getItem('musicPlaying') === 'true';
        let currentTime = parseFloat(localStorage.getItem('musicCurrentTime') || '0');
        let audioReady = false;
        
        const musicBtn = document.getElementById('musicBtn');
        const audioPlayer = document.getElementById('audioPlayer');

        // 初始化状态
        function initState() {
            if (isPlaying) {
                musicBtn.classList.add('playing');
                musicBtn.textContent = '⏸';
            } else {
                musicBtn.textContent = '🎵';
            }
        }

        // 播放/暂停切换
        function togglePlay() {
            if (!audioReady) {
                // 音频未准备好，尝试加载
                audioPlayer.load();
                audioReady = true;
                return;
            }
            
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('playing');
                localStorage.setItem('musicPlaying', 'false');
                localStorage.setItem('musicCurrentTime', audioPlayer.currentTime.toString());
                broadcastState();
            } else {
                audioPlayer.play().then(() => {
                    isPlaying = true;
                    musicBtn.textContent = '⏸';
                    musicBtn.classList.add('playing');
                    localStorage.setItem('musicPlaying', 'true');
                    broadcastState();
                }).catch(e => {
                    console.log('播放失败:', e);
                });
            }
        }

        // 点击按钮
        musicBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            togglePlay();
        });

        // 广播状态
        function broadcastState() {
            try {
                localStorage.setItem('musicPlaying', isPlaying.toString());
                localStorage.setItem('musicCurrentTime', (audioPlayer.currentTime || 0).toString());
                
                // 尝试 postMessage
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'musicState',
                        isPlaying: isPlaying,
                        currentTime: audioPlayer.currentTime
                    }, '*');
                }
            } catch (e) {}
        }

        // 监听来自其他页面的消息
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'musicToggle') {
                togglePlay();
            }
        });

        // 音频加载完成
        audioPlayer.addEventListener('canplay', () => {
            audioReady = true;
            initState();
            
            // 恢复到之前的播放位置
            if (currentTime > 0 && currentTime < audioPlayer.duration) {
                audioPlayer.currentTime = currentTime;
            }
            
            // 如果之前在播放，则继续播放
            if (isPlaying) {
                audioPlayer.play().catch(() => {
                    // 自动播放失败，等待用户交互
                    isPlaying = false;
                    musicBtn.textContent = '🎵';
                    musicBtn.classList.remove('playing');
                    localStorage.setItem('musicPlaying', 'false');
                });
            }
        });

        // 播放结束
        audioPlayer.addEventListener('ended', () => {
            isPlaying = false;
            musicBtn.textContent = '🎵';
            musicBtn.classList.remove('playing');
            localStorage.setItem('musicPlaying', 'false');
            localStorage.setItem('musicCurrentTime', '0');
            broadcastState();
        });

        // 播放时间更新
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                localStorage.setItem('musicCurrentTime', audioPlayer.currentTime.toString());
            }
        });

        // 立即初始化
        initState();
    </script>
</body>
</html>
