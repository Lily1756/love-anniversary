<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录中... · Love Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@400;500;600;700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FDFBF7;
            font-family: 'Noto Sans SC', sans-serif;
            color: #5a4a4a;
        }
        .loading-container {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #D4B5B5;
            border-top-color: #C4A8A2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 16px;
            color: #8a7070;
            margin-bottom: 12px;
        }
        .heart {
            font-size: 32px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .error-container {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .error-container.show { display: block; }
        .loading-container.hidden { display: none; }
        .error-icon { font-size: 48px; margin-bottom: 16px; }
        .error-title { font-size: 20px; margin-bottom: 8px; color: #c4a8a2; }
        .error-message { font-size: 14px; color: #8a7070; margin-bottom: 24px; }
        .retry-btn {
            background: #C4A8A2;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .retry-btn:hover {
            background: #b8a0a0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="loading-container" id="loading">
        <div class="spinner"></div>
        <p class="loading-text">正在连接 GitHub...</p>
        <div class="heart">💕</div>
    </div>

    <div class="error-container" id="error">
        <div class="error-icon">😢</div>
        <p class="error-title">登录失败了</p>
        <p class="error-message" id="errorMsg">请稍后重试</p>
        <button class="retry-btn" onclick="goBack()">返回重试</button>
    </div>

    <script>
        // GitHub OAuth 配置
        const GITHUB_CLIENT_ID = 'Ov23lij4nbbiTL51drs9';
        const GITHUB_CLIENT_SECRET = '42efddbb5bac1a0c5e3845e2e3864e9c398b0eb2';
        const REDIRECT_URI = window.location.origin + '/auth.html';

        // 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        // 存储来源页面
        const sourcePage = localStorage.getItem('oauth_source_page') || 'index.html';

        // 处理 GitHub 授权错误（如用户拒绝）
        if (error) {
            showError('您取消了授权请求');
        } else if (!code) {
            // 没有 code，跳转到 GitHub 授权页面
            const githubAuthUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=repo,user&allow_signup=true`;
            window.location.href = githubAuthUrl;
        } else {
            // 有 code，换取 access_token
            exchangeCodeForToken(code);
        }

        async function exchangeCodeForToken(code) {
            try {
                // 使用 PKCE 或直接发送 code 和 secret
                // 注意：client_secret 不能在前端暴露，这里我们通过后端代理
                // 但为了简化，我们使用 GitHub 的简化流程
                const response = await fetch('https://github.com/login/oauth/access_token', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        client_id: GITHUB_CLIENT_ID,
                        client_secret: GITHUB_CLIENT_SECRET,
                        code: code,
                        redirect_uri: REDIRECT_URI
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error_description || '获取访问令牌失败');
                    return;
                }

                const accessToken = data.access_token;

                // 获取用户信息
                const userResponse = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!userResponse.ok) {
                    showError('获取用户信息失败');
                    return;
                }

                const userData = await userResponse.json();

                // 存储认证信息
                const authData = {
                    accessToken: accessToken,
                    user: {
                        id: userData.id,
                        login: userData.login,
                        name: userData.name || userData.login,
                        avatar: userData.avatar_url,
                        blog: userData.blog
                    },
                    loginTime: Date.now()
                };

                localStorage.setItem('github_auth', JSON.stringify(authData));
                localStorage.setItem('isLoggedIn', 'true');

                // 广播登录成功消息
                localStorage.setItem('auth_status_changed', Date.now().toString());

                // 延迟跳转，让用户看到成功提示
                setTimeout(() => {
                    window.location.href = sourcePage;
                }, 1500);

            } catch (err) {
                console.error('OAuth error:', err);
                showError('网络连接失败，请检查网络后重试');
            }
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.add('show');
            document.getElementById('errorMsg').textContent = message;
        }

        function goBack() {
            window.location.href = sourcePage;
        }
    </script>
</body>
</html>
