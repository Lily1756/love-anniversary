<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FDFBF7">
    <title>照片墙 · Love Story with You</title>
    <meta name="description" content="我们的每一个瞬间，都在这里珍藏">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Dancing+Script:wght@500;600&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); scroll-behavior: smooth; -webkit-overflow-scrolling: touch; max-width: 100vw; overflow-x: hidden; }
        *, *::before, *::after { max-width: 100vw; overflow-x: hidden; }

        :root {
            --bg-primary: #FDFBF7;
            --bg-secondary: #F5F0EB;
            --accent-primary: #C4A8A2;
            --accent-secondary: #E2C5C5;
            --accent-soft: #F0E6E6;
            --text-dark: #5a4a4a;
            --text-muted: #a08080;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-soft: 0 4px 20px rgba(196, 168, 162, 0.15);
            --shadow-hover: 0 8px 32px rgba(196, 168, 162, 0.25);
        }

        body { font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; min-height: -webkit-fill-available; background-color: var(--bg-primary); color: var(--text-dark); font-size: 14px; }
        img { max-width: 100%; height: auto; display: block; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }

        /* ── 容器 ── */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }

        /* ── 顶部导航 ── */
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 24px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: rgba(255,255,255,0.9); color: var(--text-dark); text-decoration: none; border-radius: var(--radius-lg); font-size: 0.95rem; font-weight: 500; transition: all 0.3s ease; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); min-height: 44px; }
        .back-btn:active { transform: scale(0.95); }
        @media (hover: hover) { .back-btn:hover { background: var(--accent-primary); color: white; } }
        .page-title { font-size: clamp(1.3rem,4vw,1.6rem); color: var(--text-dark); font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .title-icon { height: 26px; width: auto; }
        .nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

        /* ── 编辑按钮 ── */
        .btn-edit { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; background: var(--accent-primary); color: white; border: none; border-radius: var(--radius-lg); font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; min-height: 44px; }
        .btn-edit:active { transform: scale(0.95); }
        @media (hover: hover) { .btn-edit:hover { background: var(--text-dark); } }
        .btn-add { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; background: white; color: var(--accent-primary); border: 1.5px solid var(--accent-primary); border-radius: var(--radius-lg); font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; min-height: 44px; }
        .btn-add:active { transform: scale(0.95); }
        @media (hover: hover) { .btn-add:hover { background: var(--accent-soft); } }

        /* ── 统计信息 ── */
        .photo-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 24px; font-family: 'Poppins', sans-serif; font-size: 0.9rem; color: var(--text-muted); }
        .stats-item { display: flex; align-items: center; gap: 6px; }
        .stats-number { color: var(--accent-primary); font-weight: 600; font-size: 1.1rem; }

        /* ── 标签筛选栏 ── */
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-tag { padding: 10px 20px; background: rgba(255,255,255,0.8); border: 1px solid rgba(196,168,162,0.3); border-radius: 50px; font-size: 0.9rem; color: var(--text-dark); cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px); min-height: 44px; display: flex; align-items: center; gap: 6px; }
        .filter-tag:active { transform: scale(0.95); }
        @media (hover: hover) { .filter-tag:hover { background: var(--accent-soft); border-color: var(--accent-primary); } }
        .filter-tag.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
        .filter-icon { width: 18px; height: 18px; }

        /* ── 相册网格 ── */
        .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 900px) { .album-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
        @media (max-width: 500px) { .album-grid { grid-template-columns: 1fr; gap: 14px; } }

        .album-card { position: relative; border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--shadow-soft); background: white; }
        .album-card:active { transform: scale(0.97); }
        @media (hover: hover) { .album-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); } }
        @media (hover: hover) { .album-card:hover .album-cover { transform: scale(1.08); } }

        .album-cover-wrap { position: relative; width: 100%; aspect-ratio: 4/3; overflow: hidden; }
        .album-cover { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .album-tag { position: absolute; top: 10px; left: 10px; background: rgba(196, 168, 162, 0.9); backdrop-filter: blur(8px); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 500; }
        .album-count { position: absolute; bottom: 10px; right: 10px; background: rgba(90, 74, 74, 0.75); backdrop-filter: blur(8px); color: white; padding: 4px 12px; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 0.75rem; font-weight: 500; }

        .album-info { padding: 14px 16px; }
        .album-title { font-size: 1rem; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; font-family: 'Ma Shan Zheng', cursive; }
        .album-date { font-size: 0.8rem; color: var(--text-muted); font-family: 'Poppins', sans-serif; }

        /* ── 空状态 ── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { width: 80px; height: 80px; margin: 0 auto 20px; opacity: 0.5; }
        .empty-text { font-size: 1rem; margin-bottom: 8px; }
        .empty-sub { font-size: 0.9rem; opacity: 0.8; }

        /* ── 删除按钮（编辑模式） ── */
        .album-delete { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; background: rgba(220, 53, 69, 0.9); color: white; border: none; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5; transition: all 0.2s; }
        .album-delete:active { transform: scale(0.9); }
        .edit-mode .album-delete { display: flex; }

        /* ═══════════════════════════════════════════
           全屏相册浏览模式
           ═══════════════════════════════════════════ */
        .album-viewer { position: fixed; inset: 0; background: rgba(30, 25, 25, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; display: none; opacity: 0; transition: opacity 0.35s ease; }
        .album-viewer.active { display: flex; opacity: 1; }

        /* 主图区域 */
        .viewer-main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .viewer-main-img { max-width: 90%; max-height: 85vh; object-fit: contain; border-radius: var(--radius-md); box-shadow: 0 20px 60px rgba(0,0,0,0.4); transition: transform 0.3s ease; }
        .viewer-main-img.zoomed { transform: scale(1.5); cursor: zoom-out; }
        .viewer-main-img:not(.zoomed) { cursor: zoom-in; }

        /* 左右箭头 */
        .viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 52px; height: 52px; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; z-index: 5; }
        .viewer-nav:active { transform: translateY(-50%) scale(0.9); }
        @media (hover: hover) { .viewer-nav:hover { background: rgba(255,255,255,0.3); transform: translateY(-50%) scale(1.08); } }
        .viewer-nav.prev { left: 20px; }
        .viewer-nav.next { right: 20px; }
        .viewer-nav svg { width: 24px; height: 24px; stroke: white; }

        /* 缩略图条 */
        .viewer-thumbs { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 12px; max-height: 140px; overflow-x: auto; overflow-y: hidden; display: flex; gap: 8px; align-items: center; scroll-behavior: smooth; }
        .viewer-thumbs::-webkit-scrollbar { height: 4px; }
        .viewer-thumbs::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .viewer-thumbs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
        .thumb-item { flex-shrink: 0; width: 80px; height: 60px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: all 0.2s ease; opacity: 0.6; }
        .thumb-item.active { border-color: white; opacity: 1; transform: scale(1.05); }
        @media (hover: hover) { .thumb-item:hover { opacity: 0.9; } }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 顶部信息栏 */
        .viewer-header { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: linear-gradient(rgba(0,0,0,0.5), transparent); z-index: 10; }
        .viewer-back { display: inline-flex; align-items: center; gap: 8px; color: white; text-decoration: none; font-size: 0.95rem; padding: 8px 16px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s; }
        .viewer-back:active { transform: scale(0.95); }
        .viewer-counter { color: white; font-family: 'Poppins', sans-serif; font-size: 0.9rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 50px; }

        /* 图片描述 */
        .viewer-caption { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; max-width: 80%; text-align: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .viewer-caption.show { opacity: 1; }

        /* ═══════════════════════════════════════════
           编辑模态框
           ═══════════════════════════════════════════ */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-title { font-size: 1.2rem; font-weight: 700; color: var(--text-dark); margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
        .form-input, .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid rgba(196,168,162,0.3); border-radius: var(--radius-sm); font-size: 0.95rem; color: var(--text-dark); background: white; transition: border-color 0.2s; font-family: 'Noto Sans SC', sans-serif; min-height: 44px; }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent-primary); }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: var(--radius-md); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; min-height: 44px; border: none; }
        .btn-modal:active { transform: scale(0.97); }
        .btn-cancel { background: var(--bg-secondary); color: var(--text-dark); }
        @media (hover: hover) { .btn-cancel:hover { background: var(--accent-soft); } }
        .btn-confirm { background: var(--accent-primary); color: white; }
        @media (hover: hover) { .btn-confirm:hover { background: var(--text-dark); } }
        .btn-danger { background: #dc3545; color: white; }
        @media (hover: hover) { .btn-danger:hover { background: #c82333; } }

        /* ── Toast 提示 ── */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(74, 74, 74, 0.92); color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; z-index: 3000; opacity: 0; transition: all 0.3s ease; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── 编辑入口按钮 ── */
        .fab-edit { position: fixed; right: 20px; bottom: 90px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), #a08080); color: white; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(196,168,162,0.4); z-index: 500; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .fab-edit:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(196,168,162,0.5); }
        .fab-edit:active { transform: scale(0.95); }
        .fab-edit.hidden { display: none !important; }

        /* ── 拖拽上传区域 ── */
        .upload-dropzone { border: 2px dashed var(--accent-primary); border-radius: var(--radius-md); padding: 32px 24px; text-align: center; background: var(--bg-secondary); transition: all 0.3s ease; cursor: pointer; }
        .upload-dropzone:hover { background: var(--accent-soft); border-color: #a08080; }
        .upload-dropzone.dragover { background: var(--accent-soft); border-color: var(--accent-primary); border-style: solid; transform: scale(1.02); }
        .upload-dropzone.uploading { pointer-events: none; opacity: 0.7; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .upload-text { color: var(--text-dark); font-weight: 500; margin-bottom: 6px; }
        .upload-hint { color: var(--text-muted); font-size: 0.8rem; }

        /* ── 上传进度 ── */
        .upload-progress-list { display: flex; flex-direction: column; gap: 8px; }
        .upload-progress-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); }
        .upload-progress-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .upload-progress-info { flex: 1; min-width: 0; }
        .upload-progress-name { font-size: 0.85rem; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .upload-progress-bar { height: 4px; background: rgba(196,168,162,0.2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .upload-progress-fill { height: 100%; background: var(--accent-primary); border-radius: 2px; transition: width 0.3s ease; }
        .upload-progress-status { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .upload-progress-percent { font-size: 0.8rem; color: var(--accent-primary); font-weight: 600; }

        /* ── 已上传照片列表 ── */
        .uploaded-photos-list { display: flex; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); }
        .uploaded-photo-item { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; background: white; }
        .uploaded-photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .uploaded-photo-item .remove-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; color: #e74c3c; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .uploaded-photo-item:hover .remove-btn { opacity: 1; }
        .uploaded-photo-item .caption-input { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 6px; border: none; background: rgba(0,0,0,0.6); color: white; font-size: 10px; width: 100%; outline: none; }
        .uploaded-photo-item .caption-input::placeholder { color: rgba(255,255,255,0.6); }

        /* ── 封面上传区域 ── */
        .cover-upload-area { position: relative; border: 2px dashed var(--accent-primary); border-radius: var(--radius-md); overflow: hidden; background: var(--bg-secondary); transition: all 0.3s ease; cursor: pointer; min-height: 160px; }
        .cover-upload-area:hover { background: var(--accent-soft); border-color: #a08080; }
        .cover-upload-area.dragover { background: var(--accent-soft); border-color: var(--accent-primary); border-style: solid; }
        .cover-upload-area.uploading { pointer-events: none; }
        .cover-upload-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; text-align: center; }
        .cover-upload-placeholder .upload-icon { font-size: 2rem; margin-bottom: 8px; }
        .cover-upload-placeholder .upload-text { color: var(--text-muted); font-size: 0.9rem; }
        .cover-preview { position: relative; width: 100%; height: 160px; }
        .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
        .cover-remove-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.95); border: none; color: #e74c3c; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: all 0.2s; }
        .cover-remove-btn:hover { transform: scale(1.1); background: white; }
        .cover-upload-progress { position: absolute; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .cover-upload-progress .progress-bar { width: 80%; height: 6px; background: rgba(196,168,162,0.2); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
        .cover-upload-progress .progress-fill { height: 100%; background: var(--accent-primary); border-radius: 3px; transition: width 0.3s ease; }
        .cover-upload-progress .progress-text { color: var(--text-dark); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                返回首页
            </a>
            <h1 class="page-title">
                <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="#C4A8A2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                照片墙
            </h1>
            <div class="nav-actions">
                <button class="btn-add" id="addAlbumBtn" style="display:none">+ 新建相册</button>
                <button class="btn-add" id="addPhotoBtn" style="display:none; background: var(--accent-soft); color: var(--accent-primary);">+ 添加照片</button>
                <button class="btn-edit" id="editModeBtn" style="display:none">编辑</button>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="photo-stats" id="statsBar">
            <div class="stats-item"><span class="stats-number" id="totalAlbums">0</span> 个相册</div>
            <div class="stats-item"><span class="stats-number" id="totalPhotos">0</span> 张照片</div>
        </div>

        <!-- 标签筛选 -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-tag active" data-tag="all">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                全部
            </button>
            <button class="filter-tag" data-tag="daily">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                日常
            </button>
            <button class="filter-tag" data-tag="date">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                约会
            </button>
            <button class="filter-tag" data-tag="travel">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                旅行
            </button>
            <button class="filter-tag" data-tag="anniversary">
                <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                纪念日
            </button>
        </div>

        <!-- 相册网格 -->
        <div class="album-grid" id="albumGrid"></div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display:none">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="#a08080" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p class="empty-text">还没有相册哦～</p>
            <p class="empty-sub">点击右上角「新建相册」开始记录吧</p>
        </div>
    </div>

    <!-- 全屏相册浏览 -->
    <div class="album-viewer" id="albumViewer">
        <div class="viewer-header">
            <button class="viewer-back" id="viewerBack">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                返回相册
            </button>
            <span class="viewer-counter" id="viewerCounter">1 / 1</span>
        </div>

        <div class="viewer-main" id="viewerMain">
            <button class="viewer-nav prev" id="viewerPrev">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <img class="viewer-main-img" id="viewerImg" src="" alt="">
            <button class="viewer-nav next" id="viewerNext">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>

        <div class="viewer-caption" id="viewerCaption"></div>

        <div class="viewer-thumbs" id="viewerThumbs"></div>
    </div>

    <!-- 新建/编辑相册模态框 -->
    <div class="modal-overlay" id="albumModal">
        <div class="modal-box" style="max-width: 480px;">
            <h3 class="modal-title" id="modalTitle">新建相册</h3>
            <div class="form-group"><label class="form-label">相册名称</label><input class="form-input" id="albumTitleInput" placeholder="给相册起个名字" maxlength="30"></div>
            <div class="form-group"><label class="form-label">标签分类</label>
                <select class="form-select" id="albumTagSelect">
                    <option value="daily">日常</option><option value="date">约会</option><option value="travel">旅行</option><option value="anniversary">纪念日</option>
                </select>
            </div>
            
            <!-- 封面上传区域 -->
            <div class="form-group">
                <label class="form-label">相册封面 <span style="color: var(--text-muted); font-weight: normal;">(拖拽或点击上传)</span></label>
                <div class="cover-upload-area" id="coverUploadArea">
                    <input type="file" id="coverFileInput" accept="image/*" style="display: none;">
                    <div class="cover-upload-placeholder" id="coverPlaceholder">
                        <div class="upload-icon">🖼️</div>
                        <div class="upload-text">点击或拖拽上传封面</div>
                    </div>
                    <div class="cover-preview" id="coverPreview" style="display: none;">
                        <img id="coverPreviewImg" src="" alt="封面预览">
                        <button type="button" class="cover-remove-btn" id="coverRemoveBtn" title="更换封面">×</button>
                    </div>
                    <div class="cover-upload-progress" id="coverUploadProgress" style="display: none;">
                        <div class="progress-bar"><div class="progress-fill" id="coverProgressFill"></div></div>
                        <div class="progress-text" id="coverProgressText">上传中...</div>
                    </div>
                </div>
            </div>
            
            <!-- 封面 URL 输入（可选，高级用法） -->
            <div class="form-group" style="border-top: 1px dashed rgba(196,168,162,0.3); padding-top: 12px; margin-top: 12px;">
                <label class="form-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem;" onclick="document.getElementById('coverUrlToggle').click()">
                    <input type="checkbox" id="coverUrlToggle" style="width: 16px; height: 16px; accent-color: var(--accent-primary);">
                    <span>使用图片 URL（高级）</span>
                </label>
                <input class="form-input" id="albumCoverInput" placeholder="https://..." style="display: none; margin-top: 8px;">
            </div>
            
            <div class="form-group"><label class="form-label">创建日期</label><input class="form-input" type="date" id="albumDateInput"></div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="modalCancel">取消</button>
                <button class="btn-modal btn-confirm" id="modalConfirm">创建</button>
            </div>
        </div>
    </div>

    <!-- 添加照片模态框 -->
    <div class="modal-overlay" id="photoModal">
        <div class="modal-box" style="max-width: 560px; max-height: 85vh; overflow-y: auto;">
            <h3 class="modal-title">批量添加照片</h3>
            <div class="form-group"><label class="form-label">目标相册</label>
                <select class="form-select" id="photoAlbumSelect"></select>
            </div>
            
            <!-- 拖拽上传区域 -->
            <div class="form-group">
                <label class="form-label">上传照片 <span style="color: var(--text-muted); font-weight: normal;">(支持拖拽或点击选择)</span></label>
                <div class="upload-dropzone" id="uploadDropzone">
                    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">拖拽图片到此处，或点击选择文件</div>
                    <div class="upload-hint">支持 JPG、PNG、GIF、WebP 格式</div>
                </div>
            </div>
            
            <!-- 上传进度 -->
            <div class="form-group" id="uploadProgressArea" style="display: none;">
                <label class="form-label">上传进度</label>
                <div class="upload-progress-list" id="uploadProgressList"></div>
            </div>
            
            <!-- 已上传照片列表 -->
            <div class="form-group" id="uploadedPhotosArea" style="display: none;">
                <label class="form-label">已添加照片 <span id="uploadedCount" style="color: var(--accent-primary);"></span></label>
                <div class="uploaded-photos-list" id="uploadedPhotosList"></div>
            </div>
            
            <!-- 分割线 -->
            <div style="border-top: 1px dashed rgba(196,168,162,0.3); padding-top: 16px; margin-top: 16px;">
                <label class="form-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem;" onclick="document.getElementById('urlInputToggle').click()">
                    <input type="checkbox" id="urlInputToggle" style="width: 16px; height: 16px; accent-color: var(--accent-primary);">
                    <span>使用图片 URL 添加（高级）</span>
                </label>
            </div>
            
            <!-- URL 输入区域（默认隐藏） -->
            <div id="urlInputArea" style="display: none; margin-top: 12px;">
                <div class="form-group">
                    <label class="form-label">照片列表 <span style="color: var(--text-muted); font-weight: normal;">(每行一张: URL|描述)</span></label>
                    <textarea class="form-input" id="photoBatchInput" rows="4" placeholder="https://example.com/photo1.jpg|海边日落
https://example.com/photo2.jpg|开心时刻" style="resize: vertical; font-family: monospace; font-size: 0.85rem;"></textarea>
                </div>
                
                <div class="form-group" id="batchPreviewArea" style="display: none;">
                    <label class="form-label">预览 <span id="batchCount" style="color: var(--accent-primary);"></span></label>
                    <div id="batchPreviewList" style="display: flex; flex-wrap: wrap; gap: 8px; max-height: 120px; overflow-y: auto; padding: 10px; background: var(--bg-secondary); border-radius: var(--radius-sm);"></div>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="photoCancel">取消</button>
                <button class="btn-modal btn-confirm" id="photoConfirm">添加</button>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3 class="modal-title">确认删除</h3>
            <p style="text-align:center;color:var(--text-muted);margin-bottom:20px" id="deleteMsg">确定要删除这个相册吗？</p>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="deleteCancel">取消</button>
                <button class="btn-modal btn-danger" id="deleteConfirm">删除</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 编辑模式入口按钮 -->
    <button class="fab-edit" id="fabEdit" title="进入编辑模式">✏️</button>

    <!-- 密码验证模态框 -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-box" style="max-width: 320px;">
            <h3 class="modal-title" style="text-align: center;">🔐 验证身份</h3>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 16px; font-size: 0.9rem;">输入密码进入编辑模式</p>
            <div class="form-group">
                <input class="form-input" type="password" id="authPassword" placeholder="请输入密码..." maxlength="10" style="text-align: center; font-size: 1.1rem; letter-spacing: 2px;">
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="authCancel">取消</button>
                <button class="btn-modal btn-confirm" id="authConfirm">确认</button>
            </div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="bottom-nav" id="bottomNav" style="position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(196,168,162,0.2);padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100;display:flex;justify-content:space-around;align-items:center">
        <a href="index.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--text-muted);font-size:0.7rem;padding:6px 12px;transition:color 0.2s">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
        </a>
        <a href="writings.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--text-muted);font-size:0.7rem;padding:6px 12px;transition:color 0.2s">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
            <span>小作文</span>
        </a>
        <a href="photos.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--accent-primary);font-size:0.7rem;padding:6px 12px;font-weight:600">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <span>照片墙</span>
        </a>
        <a href="travels.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--text-muted);font-size:0.7rem;padding:6px 12px;transition:color 0.2s">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>足迹</span>
        </a>
        <a href="wishes.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--text-muted);font-size:0.7rem;padding:6px 12px;transition:color 0.2s">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            <span>愿望</span>
        </a>
    </nav>

    <!-- 照片墙业务逻辑（已提取到外部文件） -->
    <script src="js/photos.js" defer></script>
</body>
</html>
