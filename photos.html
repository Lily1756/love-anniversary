    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); scroll-behavior: smooth; -webkit-overflow-scrolling: touch; /* 强制防溢出 */ max-width: 100vw; overflow-x: hidden; }

        /* Logo 导航样式 */
        .logo-nav {
            height: 40px;
            width: auto;
            display: inline-block;
            vertical-align: middle;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .logo-nav:hover {
            opacity: 0.8;
        }

        /* 【强制移动端适配】全局防溢出规则 */
        *, *::before, *::after { max-width: 100vw; overflow-x: hidden; box-sizing: border-box; }
        img { max-width: 100%; height: auto; display: block; }
        div, section, article, aside, header, footer, nav, main { max-width: 100vw; overflow-x: hidden; }
        .container, .top-bar, .photo-stats { flex-wrap: wrap; }
        :root {
            --bg-primary: #FDFBF7;
            --bg-secondary: #F5F0EB;
            --accent-primary: #D4B5B5;
            --accent-secondary: #E2C5C5;
            --accent-soft: #F0E6E6;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --text-dark: #5a4a4a;
        }
        body { font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; min-height: -webkit-fill-available; background-color: #FDFBF7; position: relative; color: var(--text-dark); /* 移动端基础字体不小于14px */ font-size: 14px; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; padding-bottom: 60px; }

        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; background: rgba(255,255,255,0.8); color: var(--text-dark); text-decoration: none; border-radius: var(--radius-lg); font-size: clamp(0.9rem,2.5vw,1rem); font-weight: 500; transition: all 0.3s ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); touch-action: manipulation; white-space: nowrap; min-height: 44px; min-width: 44px; }
        .back-btn:active { transform: scale(0.95); }
        @media (hover: hover) { .back-btn:hover { background: var(--accent-primary); color: white; } }
        .page-title { font-size: clamp(1.5rem,4vw,2rem); color: #5a4a4a; font-weight: 700; text-align: center; flex: 1; min-width: 200px; }

        .photo-stats { display: flex; justify-content: center; gap: 25px; margin-bottom: 25px; font-family: 'Poppins', sans-serif; font-size: 0.9rem; color: #a08080; }
        .stats-item { display: flex; align-items: center; gap: 6px; }
        .stats-number { color: #d4a5a5; font-weight: 600; font-size: 1.1rem; }

        .photo-grid { column-count: 4; column-gap: 1.5rem; }
        .photo-card { break-inside: avoid; margin-bottom: 1.5rem; background: white; border-radius: var(--radius-md); padding: 10px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 2px 12px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; min-height: 44px; }

        /* 编辑模式样式 */
        .edit-toggle-btn {
            position: fixed;
            right: 24px;
            bottom: 160px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212,165,165,0.3);
            box-shadow: 0 4px 16px rgba(212,165,165,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            color: var(--accent-primary);
        }

        .edit-toggle-btn:hover {
            background: var(--accent-primary);
            color: white;
            transform: scale(1.1);
        }

        .edit-toggle-btn.hidden {
            display: none;
        }

        body.editing-mode .edit-toggle-btn {
            background: var(--accent-primary);
            color: white;
        }

        body.editing-mode .photo-card:hover {
            box-shadow: 0 0 0 3px var(--accent-primary);
        }
        .photo-card:active { transform: scale(0.98); }
        @media (hover: hover) { .photo-card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(212,165,165,0.3); } .photo-card:hover .photo-overlay { opacity: 1; } .photo-card:hover .photo-image { transform: scale(1.05); } }

        .photo-wrapper { position: relative; overflow: hidden; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .photo-image { width: 100%; display: block; transition: transform 0.4s ease; }
        .photo-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 15px 15px; background: linear-gradient(transparent, rgba(90,74,74,0.85)); opacity: 0; transition: opacity 0.3s ease; }
        .photo-overlay-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.1rem; color: white; margin-bottom: 5px; }
        .photo-overlay-date { font-family: 'Poppins', sans-serif; font-size: 0.8rem; color: rgba(255,255,255,0.8); }

        .lightbox { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; /* 强制防溢出 */ max-width: 100vw; max-height: 100vh; overflow: hidden; }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox-content { max-width: 90vw; max-height: 85vh; position: relative; animation: scaleIn 0.3s ease; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .lightbox-image { max-width: 100%; max-height: 75vh; border-radius: var(--radius-md); border: 3px solid white; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .lightbox-info { text-align: center; padding: 20px; color: white; }
        .lightbox-title { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(1.3rem,4vw,1.8rem); margin-bottom: 8px; }
        .lightbox-date { font-family: 'Poppins', sans-serif; font-size: 0.95rem; color: rgba(255,255,255,0.7); }
        .lightbox-close { position: absolute; top: 20px; right: 20px; width: 44px; height: 44px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .lightbox-close:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
        @media (hover: hover) { .lightbox-close:hover { background: rgba(255,255,255,0.3); } }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .lightbox-nav:active { transform: translateY(-50%) scale(0.9); background: rgba(255,255,255,0.3); }
        @media (hover: hover) { .lightbox-nav:hover { background: rgba(255,255,255,0.3); } }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-family: 'Poppins', sans-serif; font-size: 0.9rem; color: rgba(255,255,255,0.6); }

        @media (max-width: 1100px) { .photo-grid { column-count: 3; } }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .top-bar { flex-direction: column; align-items: stretch; gap: 10px; }
            .back-btn { align-self: flex-start; }
            .page-title { text-align: left; min-width: auto; }
            .photo-stats { flex-wrap: wrap; justify-content: center; }
            .photo-grid { column-count: 2; column-gap: 15px; }
            .photo-card { margin-bottom: 15px; }
            .lightbox-nav { width: 40px; height: 40px; font-size: 1.2rem; }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
        @media (max-width: 480px) {
            .page-title { font-size: 1.3rem; }
            .photo-grid { column-count: 2; column-gap: 12px; }
            .photo-card { padding: 8px; margin-bottom: 12px; border-radius: 12px; }
            .photo-overlay { padding: 30px 10px 10px; }
            .photo-overlay-title { font-size: 1rem; }
        }

        /* =============================================
           【强制移动端适配】iPhone SE (375px) 专项修复
           ============================================= */
        @media (max-width: 480px) {
            /* 全局重置 - 强制防溢出 */
            * {
                max-width: 100vw !important;
                overflow-x: hidden !important;
                box-sizing: border-box;
            }

            html, body {
                font-size: 14px !important;
                line-height: 1.5 !important;
            }

            /* 容器限制 */
            .container {
                padding: 12px !important;
                max-width: 100vw !important;
                padding-bottom: 80px !important;
            }

            /* 顶部导航优化 */
            .top-bar {
                gap: 8px !important;
            }

            .back-btn, .nav-links a {
                min-height: 44px !important;
                min-width: 44px !important;
                padding: 10px 12px !important;
                font-size: 14px !important;
            }

            .page-title {
                font-size: 1.2rem !important;
                min-width: auto !important;
                text-align: center !important;
            }

            /* 照片统计 */
            .photo-stats {
                gap: 15px !important;
                font-size: 0.85rem !important;
            }

            /* 瀑布流网格 */
            .photo-grid {
                column-count: 2 !important;
                column-gap: 10px !important;
            }

            .photo-card {
                padding: 6px !important;
                margin-bottom: 10px !important;
                border-radius: 10px !important;
                min-height: unset !important;
            }

            .photo-wrapper {
                border-radius: 8px !important;
            }

            .photo-overlay {
                padding: 25px 8px 8px !important;
            }

            .photo-overlay-title {
                font-size: 0.9rem !important;
            }

            .photo-overlay-date {
                font-size: 0.75rem !important;
            }

            /* 灯箱优化 */
            .lightbox {
                z-index: 99999 !important;
            }

            .lightbox-content {
                max-width: 95vw !important;
                max-height: 90vh !important;
            }

            .lightbox-image {
                max-width: 95vw !important;
                max-height: 70vh !important;
                border-radius: 8px !important;
            }

            .lightbox-close {
                top: 15px !important;
                right: 15px !important;
                width: 40px !important;
                height: 40px !important;
                font-size: 1.2rem !important;
            }

            .lightbox-nav {
                width: 36px !important;
                height: 36px !important;
                font-size: 1rem !important;
            }

            .lightbox-prev {
                left: 10px !important;
            }

            .lightbox-next {
                right: 10px !important;
            }

            .lightbox-info {
                padding: 15px !important;
            }

            .lightbox-title {
                font-size: 1.1rem !important;
            }

            .lightbox-date {
                font-size: 0.85rem !important;
            }

            .lightbox-counter {
                bottom: 15px !important;
                font-size: 0.85rem !important;
            }

            /* 音乐播放器位置 */
            iframe#musicIframe {
                bottom: calc(20px + env(safe-area-inset-bottom)) !important;
                left: 15px !important;
                width: 40px !important;
                height: 40px !important;
            }

            /* 所有按钮最小点击区域 */
            button, .back-btn, .photo-card, .lightbox-close, .lightbox-nav {
                min-height: 44px !important;
                min-width: 44px !important;
                touch-action: manipulation !important;
            }
        }

        /* ── GitHub 登录容器 ── */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #authContainer {
            display: inline-block;
        }

        /* ── 照片操作区 ── */
        .photo-header-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .photo-actions {
            display: flex;
            gap: 8px;
        }

        .photo-add-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--accent-primary);
            color: white;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .photo-add-btn:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
        }

        .photo-add-btn.hidden {
            display: none;
        }

        /* ── 照片删除按钮 ── */
        .photo-card {
            position: relative;
        }

        .photo-delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(200, 80, 80, 0.9);
            color: white;
            font-size: 16px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .photo-card:hover .photo-delete-btn {
            opacity: 1;
        }

        .photo-delete-btn:hover {
            background: #c44040;
            transform: scale(1.1);
        }

        /* ── 添加照片模态框 ── */
        .upload-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }

        .upload-modal.open {
            display: flex;
        }

        .upload-modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }

        .upload-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .upload-modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-dark);
            font-family: 'Noto Sans SC', sans-serif;
        }

        .upload-modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f5f0eb;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .upload-modal-close:hover {
            background: #e5dcd6;
        }

        /* 图片上传区域 */
        .upload-dropzone {
            border: 2px dashed #d4b5b5;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #faf8f6;
            margin-bottom: 20px;
        }

        .upload-dropzone:hover, .upload-dropzone.dragover {
            border-color: var(--accent-primary);
            background: #f5f0eb;
        }

        .upload-dropzone-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-dropzone-text {
            color: #a08080;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .upload-dropzone-hint {
            color: #c0a0a0;
            font-size: 0.85rem;
        }

        .upload-preview {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .upload-preview.show {
            display: block;
        }

        /* 表单字段 */
        .upload-form-group {
            margin-bottom: 16px;
        }

        .upload-form-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .upload-form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5dcd6;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
            background: white;
        }

        .upload-form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(212, 165, 165, 0.2);
        }

        .upload-form-row {
            display: flex;
            gap: 12px;
        }

        .upload-form-row .upload-form-group {
            flex: 1;
        }

        /* 分类选择 */
        .upload-category-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .upload-category-option {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #e5dcd6;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .upload-category-option:hover {
            border-color: var(--accent-primary);
        }

        .upload-category-option.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        /* 上传按钮 */
        .upload-submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .upload-submit-btn:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
        }

        .upload-submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 上传进度 */
        .upload-progress {
            display: none;
            margin-top: 15px;
        }

        .upload-progress.show {
            display: block;
        }

        .upload-progress-bar {
            height: 6px;
            background: #e5dcd6;
            border-radius: 3px;
            overflow: hidden;
        }

        .upload-progress-fill {
            height: 100%;
            background: var(--accent-primary);
            width: 0%;
            transition: width 0.3s;
        }

        .upload-progress-text {
            text-align: center;
            font-size: 0.85rem;
            color: #a08080;
            margin-top: 8px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(90, 74, 74, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 99999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(80, 160, 100, 0.95);
        }

        .toast.error {
            background: rgba(200, 80, 80, 0.95);
        }

        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99998;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f5f0eb;
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a08080;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .empty-state-hint {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* 隐藏的文件输入 */
        #photoFileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="back-btn" title="返回首页">
                <img src="assets/logo/nav-logo.svg" alt="首页" class="logo-nav">
            </a>
            <h1 class="page-title"><img src="assets/icons/icon-photos.svg" alt="" class="title-icon">我们的回忆胶片</h1>
            <div class="nav-actions">
                <a href="writings.html" class="back-btn" style="padding: 6px 10px;"><img src="assets/icons/icon-writings.svg" alt="" class="site-icon-inline"></a>
                <a href="travels.html" class="back-btn" style="padding: 6px 10px;"><img src="assets/icons/icon-travels.svg" alt="" class="site-icon-inline"></a>
                <a href="wishes.html" class="back-btn" style="padding: 6px 10px;"><img src="assets/icons/icon-wishes.svg" alt="" class="site-icon-inline"></a>
            </div>
        </div>

        <div class="photo-header-row">
            <div class="photo-actions" id="photoActions">
                <button class="photo-add-btn hidden" id="addPhotoBtn" onclick="openUploadModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    添加照片
                </button>
            </div>
        </div>

        <div class="photo-stats">
            <div class="stats-item"><span class="stats-number" id="totalPhotos">6</span> 张照片</div>
            <a href="travels.html" style="color: var(--accent-primary); text-decoration: none; font-size: 0.9rem;"><img src="assets/icons/icon-travels.svg" alt="" class="site-icon-inline">足迹地图</a>
        </div>

        <div class="photo-grid" id="photoGrid"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <div class="lightbox-info">
                <div class="lightbox-title" id="lightboxTitle"></div>
                <div class="lightbox-date" id="lightboxDate"></div>
            </div>
        </div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<!-- 添加照片模态框 -->
<div class="upload-modal" id="uploadModal">
    <div class="upload-modal-content">
        <div class="upload-modal-header">
            <h3 class="upload-modal-title">添加照片</h3>
            <button class="upload-modal-close" id="uploadModalClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="upload-dropzone" id="uploadDropzone">
            <div class="upload-dropzone-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d4b5b5" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17,8 12,3 7,8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <div class="upload-dropzone-text">点击或拖拽上传照片</div>
            <div class="upload-dropzone-hint">支持 JPG、PNG，建议大小不超过 5MB</div>
        </div>
        <input type="file" id="photoFileInput" accept="image/*">

        <img class="upload-preview" id="uploadPreview" alt="预览">

        <div class="upload-form-group">
            <label class="upload-form-label">描述文字</label>
            <input type="text" class="upload-form-input" id="photoCaption" placeholder="这张照片的故事..." maxlength="100">
        </div>

        <div class="upload-form-row">
            <div class="upload-form-group">
                <label class="upload-form-label">拍摄日期</label>
                <input type="date" class="upload-form-input" id="photoDate">
            </div>
            <div class="upload-form-group">
                <label class="upload-form-label">分类</label>
                <div class="upload-category-options">
                    <button type="button" class="upload-category-option active" data-category="daily">日常</button>
                    <button type="button" class="upload-category-option" data-category="date">约会</button>
                    <button type="button" class="upload-category-option" data-category="travel">旅行</button>
                    <button type="button" class="upload-category-option" data-category="celebration">纪念日</button>
                </div>
            </div>
        </div>

        <div class="upload-form-group">
            <label class="upload-form-label">拍摄地点（选填）</label>
            <input type="text" class="upload-form-input" id="photoLocation" placeholder="北京、上海..." maxlength="50">
        </div>

        <button class="upload-submit-btn" id="uploadSubmitBtn">保存照片</button>

        <div class="upload-progress" id="uploadProgress">
            <div class="upload-progress-bar">
                <div class="upload-progress-fill" id="uploadProgressFill"></div>
            </div>
            <div class="upload-progress-text" id="uploadProgressText">上传中...</div>
        </div>
    </div>
</div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

    <script src="js/upload-photo.js"></script>
    <script src="js/simple-auth.js"></script>
    <script>
        let photosData = [];
        let currentLightboxIndex = 0;
        let selectedCategory = 'daily';
        let selectedFile = null;
        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;

        // Toast 提示
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 加载照片
        async function loadPhotos() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('show');
            try {
                const photos = await PhotoUploader.loadPhotos();
                photosData = photos.map(p => ({
                    id: p.id,
                    src: p.url,
                    title: p.caption || '照片',
                    date: p.date || ''
                }));
                renderPhotos();
            } catch (err) {
                console.error('加载照片失败:', err);
                showToast('加载照片失败，请刷新重试', 'error');
            } finally {
                overlay.classList.remove('show');
            }
        }

        function renderPhotos() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';

            if (photosData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d4b5b5" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21,15 16,10 5,21"/>
                            </svg>
                        </div>
                        <div class="empty-state-text">还没有照片</div>
                        <div class="empty-state-hint">点击右上角「添加照片」记录美好时刻</div>
                    </div>`;
                document.getElementById('totalPhotos').textContent = '0';
                return;
            }

            const isMobileScreen = window.innerWidth <= 768;

            photosData.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                const src = isMobileScreen ? photo.src.replace('w=600', 'w=400') : photo.src;
                card.innerHTML = `
                    <div class="photo-wrapper">
                        <img class="photo-image" src="${src}" alt="${photo.title}" loading="lazy" decoding="async">
                        <div class="photo-overlay">
                            <div class="photo-overlay-title">${photo.title}</div>
                            <div class="photo-overlay-date">${photo.date}</div>
                        </div>
                        ${isEditingMode ? '<button class="photo-delete-btn" data-id="' + photo.id + '" title="删除照片">✕</button>' : ''}
                    </div>`;
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('photo-delete-btn')) {
                        openLightbox(index);
                    }
                });
                grid.appendChild(card);
            });

            // 绑定删除按钮
            document.querySelectorAll('.photo-delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (confirm('确定要删除这张照片吗？')) {
                        await deletePhoto(id);
                    }
                });
            });

            document.getElementById('totalPhotos').textContent = photosData.length;
        }

        // 删除照片
        async function deletePhoto(id) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('show');
            try {
                await PhotoUploader.deletePhoto(id);
                showToast('照片已删除', 'success');
                await loadPhotos();
            } catch (err) {
                console.error('删除失败:', err);
                showToast('删除失败: ' + err.message, 'error');
            } finally {
                overlay.classList.remove('show');
            }
        }

        // 上传照片
        async function uploadPhoto() {
            if (!selectedFile) {
                showToast('请先选择照片', 'error');
                return;
            }

            const caption = document.getElementById('photoCaption').value.trim();
            const date = document.getElementById('photoDate').value;
            const location = document.getElementById('photoLocation').value.trim();

            const btn = document.getElementById('uploadSubmitBtn');
            const progress = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('uploadProgressFill');
            const progressText = document.getElementById('uploadProgressText');

            btn.disabled = true;
            progress.classList.add('show');
            progressText.textContent = '压缩图片中...';
            progressFill.style.width = '20%';

            try {
                // 生成文件名
                const dateStr = date || new Date().toISOString().split('T')[0];
                const filename = `${dateStr}_${Date.now()}.jpg`;

                progressText.textContent = '上传图片中...';
                progressFill.style.width = '50%';

                // 上传图片
                const imageUrl = await PhotoUploader.uploadImage(selectedFile, filename);

                progressText.textContent = '保存信息中...';
                progressFill.style.width = '80%';

                // 保存元数据
                await PhotoUploader.addPhoto({
                    url: imageUrl,
                    caption: caption,
                    date: date,
                    category: selectedCategory,
                    location: location
                });

                progressFill.style.width = '100%';
                progressText.textContent = '完成！';

                showToast('照片上传成功！', 'success');
                closeUploadModal();
                await loadPhotos();

            } catch (err) {
                console.error('上传失败:', err);
                showToast('上传失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                setTimeout(() => {
                    progress.classList.remove('show');
                    progressFill.style.width = '0%';
                }, 500);
            }
        }

        // 打开上传模态框
        function openUploadModal() {
            if (!SimpleAuth.getPat()) {
                showToast('请先进入编辑模式', 'error');
                openPasswordModal();
                return;
            }
            document.getElementById('uploadModal').classList.add('open');
            document.body.style.overflow = 'hidden';
            // 设置默认日期为今天
            document.getElementById('photoDate').value = new Date().toISOString().split('T')[0];
        }

        // 关闭上传模态框
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('open');
            document.body.style.overflow = '';
            // 清空表单
            selectedFile = null;
            document.getElementById('uploadPreview').classList.remove('show');
            document.getElementById('photoCaption').value = '';
            document.getElementById('photoDate').value = '';
            document.getElementById('photoLocation').value = '';
            selectedCategory = 'daily';
            document.querySelectorAll('.upload-category-option').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === 'daily');
            });
        }

        // 处理文件选择
        function handleFileSelect(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }

            if (file.size > 10 * 1024 * 1024) { // 10MB
                showToast('图片大小不能超过 10MB', 'error');
                return;
            }

            selectedFile = file;
            const preview = document.getElementById('uploadPreview');
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.add('show');
            };
            reader.readAsDataURL(file);
        }

        // Lightbox 函数
        function openLightbox(index) {
            currentLightboxIndex = index;
            const photo = photosData[index];
            document.getElementById('lightboxImage').src = photo.src;
            document.getElementById('lightboxTitle').textContent = photo.title;
            document.getElementById('lightboxDate').textContent = photo.date;
            document.getElementById('lightboxCounter').textContent = `${index + 1} / ${photosData.length}`;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function navigateLightbox(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex < 0) currentLightboxIndex = photosData.length - 1;
            if (currentLightboxIndex >= photosData.length) currentLightboxIndex = 0;
            openLightbox(currentLightboxIndex);
        }

        // 事件绑定
        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('lightboxPrev').addEventListener('click', () => navigateLightbox(-1));
        document.getElementById('lightboxNext').addEventListener('click', () => navigateLightbox(1));
        document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') closeLightbox(); });

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        let touchStartX = 0;
        document.getElementById('lightbox').addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        document.getElementById('lightbox').addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) navigateLightbox(diff > 0 ? 1 : -1);
        }, { passive: true });

        // 上传模态框事件
        document.getElementById('uploadModalClose').addEventListener('click', closeUploadModal);
        document.getElementById('uploadModal').addEventListener('click', (e) => {
            if (e.target.id === 'uploadModal') closeUploadModal();
        });

        // 文件上传区域
        const dropzone = document.getElementById('uploadDropzone');
        const fileInput = document.getElementById('photoFileInput');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            handleFileSelect(file);
        });
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // 分类选择
        document.querySelectorAll('.upload-category-option').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.upload-category-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCategory = btn.dataset.category;
            });
        });

        // 提交按钮
        document.getElementById('uploadSubmitBtn').addEventListener('click', uploadPhoto);

        // 监听 localStorage 变化，同步音乐状态
        window.addEventListener('storage', (e) => {
            if (e.key === 'musicPlaying' || e.key === 'musicCurrentTime') {
                const iframe = document.getElementById('musicIframe');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        type: 'syncMusic',
                        isPlaying: localStorage.getItem('musicPlaying') === 'true',
                        currentTime: parseFloat(localStorage.getItem('musicCurrentTime') || '0')
                    }, '*');
                }
            }
        });

    </script>

    <!-- 跨页面音乐播放器 -->
    <iframe src="music-player.html" style="position: fixed; bottom: 25px; left: 25px; width: 44px; height: 44px; border: none; z-index: 9998; background: transparent;" allow="autoplay" id="musicIframe" title="音乐播放器"></iframe>

    <!-- 编辑按钮 -->
    <button class="edit-toggle-btn hidden" id="editBtn" title="编辑内容">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
    </button>

    <script src="js/simple-edit.js"></script>
    <script>
        // 页面加载完成后初始化照片
        document.addEventListener('DOMContentLoaded', () => {
            loadPhotos();
        });
    </script>
</html>
