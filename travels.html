<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们的足迹 💕</title>
    <link href="https://cdn.jsdelivr.net/npm/mapbox-gl@3.3.0/dist/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mapbox-gl@3.3.0/dist/mapbox-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b9d;
            --primary-light: #ffa4c4;
            --secondary: #c44569;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: rgba(0, 0, 0, 0.1);
            --text-light: #fff;
            --text-dark: #2d3436;
            --timeline-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-light);
        }

        /* Stars Background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 107, 157, 0.2);
            border: 1px solid rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 107, 157, 0.4);
            transform: translateX(-3px);
        }

        .nav-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 24px;
            background: linear-gradient(135deg, #ff6b9d, #ffa4c4, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .zoom-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Map Container */
        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Timeline Sidebar */
        .timeline {
            position: fixed;
            left: 20px;
            top: 80px;
            bottom: 20px;
            width: 320px;
            max-width: calc(100vw - 40px);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px var(--glass-shadow);
        }

        .timeline-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(196, 69, 105, 0.1));
        }

        .timeline-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 20px;
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timeline-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .timeline-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .timeline-list::-webkit-scrollbar {
            width: 4px;
        }

        .timeline-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .timeline-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .timeline-item:hover {
            background: rgba(255, 107, 157, 0.2);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .timeline-item.active {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.3), rgba(196, 69, 105, 0.2));
            border-color: var(--primary);
        }

        .timeline-date {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .timeline-year {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }

        .timeline-day {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-light);
        }

        .timeline-month {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-place {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .timeline-memo {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Heart Marker */
        .heart-marker {
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .heart-marker:hover {
            transform: scale(1.2);
        }

        .heart-marker svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(255, 107, 157, 0.8));
        }

        .heart-marker.pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Popup Card */
        .mapboxgl-popup {
            max-width: 320px !important;
            z-index: 200;
        }

        .mapboxgl-popup-content {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px !important;
            border: 1px solid rgba(255, 107, 157, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 0 !important;
            overflow: hidden;
        }

        .mapboxgl-popup-tip {
            border-top-color: rgba(255, 255, 255, 0.95) !important;
        }

        .mapboxgl-popup-close-button {
            color: var(--secondary) !important;
            font-size: 20px;
            padding: 10px;
            right: 5px;
            top: 5px;
        }

        .popup-card {
            width: 280px;
        }

        .popup-photo {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
        }

        .popup-body {
            padding: 15px;
        }

        .popup-place {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 18px;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .popup-date {
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .popup-memory {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Mobile Timeline */
        .timeline-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            z-index: 150;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
        }

        .timeline-toggle:hover {
            transform: translateX(-50%) scale(1.05);
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            .timeline {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: -100%;
                width: auto;
                max-height: 60vh;
                border-radius: 20px 20px 0 0;
                transition: bottom 0.4s ease;
            }

            .timeline.open {
                bottom: 0;
            }

            .timeline-toggle {
                display: block;
            }

            .nav-title {
                font-size: 18px;
            }

            .zoom-hint {
                display: none;
            }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-heart {
            width: 60px;
            height: 60px;
            animation: heartbeat 1s ease-in-out infinite;
        }

        .loading-heart svg {
            width: 100%;
            height: 100%;
            fill: var(--primary);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Controls */
        .mapboxgl-ctrl-group {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(10px) !important;
            border-radius: 10px !important;
            border: 1px solid var(--glass-border) !important;
        }

        .mapboxgl-ctrl-group button {
            background: transparent !important;
            border-color: var(--glass-border) !important;
        }

        .mapboxgl-ctrl-group button:hover {
            background: rgba(255, 107, 157, 0.2) !important;
        }

        .mapboxgl-ctrl-icon {
            filter: invert(1);
        }
    </style>
</head>
<body>
    <!-- Stars Background -->
    <div class="stars" id="stars"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="loading-heart">
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <div class="loading-text">正在飞向我们的足迹 ✈️</div>
    </div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-left">
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回首页
            </a>
            <a href="writings.html" class="back-link" style="padding: 6px 12px; font-size: 0.85rem;">💌</a>
            <a href="wishes.html" class="back-link" style="padding: 6px 12px; font-size: 0.85rem;">✨</a>
        </div>
        <h1 class="nav-title">💕 我们的足迹</h1>
        <div class="nav-right">
            <div class="zoom-hint" style="background: rgba(255,107,157,0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem;">
                💡 点击爱心或时间轴查看详情
            </div>
        </div>
    </nav>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Timeline Sidebar -->
    <aside class="timeline" id="timeline">
        <div class="timeline-header">
            <div class="timeline-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                足迹时间轴
            </div>
            <div class="timeline-count" id="timelineCount">共 0 个足迹</div>
        </div>
        <div class="timeline-list" id="timelineList">
            <!-- Timeline items will be injected here -->
        </div>
    </aside>

    <!-- Mobile Toggle -->
    <button class="timeline-toggle" id="timelineToggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 5px;">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
        </svg>
        足迹时间轴
    </button>

    <script>
        // ========================================
        // Mapbox Configuration
        // ========================================
        // IMPORTANT: Please replace with your own Mapbox token
        // Get one for free at: https://account.mapbox.com/
        const MAPBOX_TOKEN = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw';

        // ========================================
        // Global State
        // ========================================
        let map;
        let travelsData = [];
        let activeMarker = null;

        // ========================================
        // Initialize Stars Background
        // ========================================
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 200;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // ========================================
        // Load Travels Data
        // ========================================
        async function loadTravelsData() {
            try {
                const response = await fetch('data/travels.json');
                travelsData = await response.json();
                return travelsData;
            } catch (error) {
                console.error('Failed to load travels data:', error);
                return [];
            }
        }

        // ========================================
        // Initialize Map
        // ========================================
        async function initMap() {
            mapboxgl.accessToken = MAPBOX_TOKEN;

            map = new mapboxgl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'carto-dark': {
                            type: 'raster',
                            tiles: [
                                'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
                                'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
                                'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
                            ],
                            tileSize: 256,
                            attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
                        },
                        // 高德地图瓦片（卫星图）- 作为备用
                        'amap-satellite': {
                            type: 'raster',
                            tiles: [
                                'https://webst0{s}.is.autonavi.com/appstudioxe/v3/map/st Satellite/{z}/{x}/{y}?fm=127&ak=your_amap_ak'
                            ],
                            tileSize: 256,
                            bounds: [72.0, 18.0, 135.0, 54.0],
                            attribution: '&copy; 高德地图'
                        }
                    },
                    layers: [
                        {
                            id: 'carto-dark-layer',
                            type: 'raster',
                            source: 'carto-dark',
                            minzoom: 0,
                            maxzoom: 22
                        }
                    ]
                },
                center: [105.0, 35.0], // China center
                zoom: 3,
                minZoom: 1.5,
                maxZoom: 18,
                projection: 'globe',
                maxBounds: [[-180, -85], [180, 85]]
            });

            // Set atmosphere and fog for 3D globe effect
            map.on('style.load', () => {
                map.setFog({
                    range: [-1, 2],
                    'horizon-blend': 0.1,
                    color: 'rgb(10, 10, 30)',
                    'high-color': 'rgb(30, 30, 80)',
                    'space-color': 'rgb(5, 5, 15)',
                    'star-intensity': 0.8
                });
            });

            // Wait for map to load
            await new Promise(resolve => map.on('load', resolve));

            return map;
        }

        // ========================================
        // Create Heart Marker
        // ========================================
        function createHeartMarker() {
            const el = document.createElement('div');
            el.className = 'heart-marker';
            el.innerHTML = `
                <svg viewBox="0 0 24 24" fill="#ff6b9d">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            `;
            return el;
        }

        // ========================================
        // Create Popup Content
        // ========================================
        function createPopupContent(travel) {
            const photo = travel.photo || 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600';
            return `
                <div class="popup-card">
                    <img src="${photo}" alt="${travel.name}" class="popup-photo" onerror="this.src='https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600'">
                    <div class="popup-body">
                        <div class="popup-place">${travel.name}</div>
                        <div class="popup-date">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            ${travel.date}
                        </div>
                        <div class="popup-memory">${travel.memory}</div>
                    </div>
                </div>
            `;
        }

        // ========================================
        // Add Markers to Map
        // ========================================
        function addMarkers() {
            travelsData.forEach(travel => {
                const el = createHeartMarker();

                // Create marker
                const marker = new mapboxgl.Marker({
                    element: el,
                    anchor: 'center'
                })
                .setLngLat(travel.location)
                .setPopup(
                    new mapboxgl.Popup({ offset: 25, closeButton: true })
                    .setHTML(createPopupContent(travel))
                )
                .addTo(map);

                // Add click event to timeline item
                el.addEventListener('click', () => {
                    flyToLocation(travel);
                });
            });
        }

        // ========================================
        // Fly to Location
        // ========================================
        function flyToLocation(travel) {
            // Close any open popup
            if (activeMarker) {
                activeMarker.togglePopup();
            }

            // Find and open the marker popup
            map.eachLayer(layer => {
                if (layer instanceof mapboxgl.Marker && layer.getLngLat().lng === travel.location[0]) {
                    activeMarker = layer;
                    layer.togglePopup();
                }
            });

            // Fly to location
            map.flyTo({
                center: travel.location,
                zoom: 12,
                speed: 1.2,
                curve: 1.4,
                essential: true
            });

            // Highlight timeline item
            highlightTimelineItem(travel.id);
        }

        // ========================================
        // Build Timeline
        // ========================================
        function buildTimeline() {
            const timelineList = document.getElementById('timelineList');
            const timelineCount = document.getElementById('timelineCount');

            // Sort by date descending
            const sortedData = [...travelsData].sort((a, b) => new Date(b.date) - new Date(a.date));

            timelineCount.textContent = `共 ${sortedData.length} 个足迹`;

            sortedData.forEach(travel => {
                const date = new Date(travel.date);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();

                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.dataset.id = travel.id;
                item.innerHTML = `
                    <div class="timeline-date">
                        <span class="timeline-year">${year}</span>
                        <span class="timeline-day">${day}</span>
                        <span class="timeline-month">${month}月</span>
                    </div>
                    <div class="timeline-content">
                        <div class="timeline-place">${travel.name}</div>
                        <div class="timeline-memo">${travel.memory}</div>
                    </div>
                `;

                item.addEventListener('click', () => {
                    // Remove active class from all items
                    document.querySelectorAll('.timeline-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    flyToLocation(travel);
                });

                timelineList.appendChild(item);
            });
        }

        // ========================================
        // Highlight Timeline Item
        // ========================================
        function highlightTimelineItem(id) {
            document.querySelectorAll('.timeline-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.id === String(id)) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        }

        // ========================================
        // Mobile Timeline Toggle
        // ========================================
        function initMobileTimeline() {
            const toggle = document.getElementById('timelineToggle');
            const timeline = document.getElementById('timeline');

            toggle.addEventListener('click', () => {
                timeline.classList.toggle('open');
            });

            // Close timeline when clicking outside on mobile
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 &&
                    !timeline.contains(e.target) &&
                    !toggle.contains(e.target)) {
                    timeline.classList.remove('open');
                }
            });
        }

        // ========================================
        // Initialize
        // ========================================
        async function init() {
            // Create stars background
            createStars();

            // Load data
            await loadTravelsData();

            // Build timeline
            buildTimeline();

            // Initialize mobile timeline toggle
            initMobileTimeline();

            // Initialize map
            await initMap();

            // Add markers
            addMarkers();

            // Hide loading overlay
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        }

        // Start
        init();
    </script>
