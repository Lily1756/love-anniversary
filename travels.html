    <script>
        /* =============================================
           【彻底重建】足迹页面 - 使用 Leaflet + OpenStreetMap
           ============================================= */
        
        // ========================================
        // Global State - 全局状态管理
        // ========================================
        let map = null;                    // Leaflet 地图实例
        let travelsData = [];              // 足迹数据
        let markers = [];                  // 标记数组
        let infoWindow = null;             // 信息窗体实例
        let currentMarkerId = null;        // 当前选中的标记ID
        
        // ========================================
        // 加载足迹数据
        // ========================================
        async function loadTravelsData() {
            try {
                const response = await fetch('data/travels.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                travelsData = await response.json();
                console.log('Travels data loaded:', travelsData.length, 'items');
                return travelsData;
            } catch (error) {
                console.error('Failed to load travels data:', error);
                return [];
            }
        }
        
        // ========================================
        // 初始化 Leaflet 地图
        // 中心点设为 [39.916527, 116.397128] (北京) [纬度, 经度]
        // 缩放级别为 5
        // ========================================
        function initMap() {
            return new Promise((resolve, reject) => {
                try {
                    // 创建地图实例
                    map = L.map('container', {
                        center: [39.916527, 116.397128],  // 北京 [纬度, 经度]
                        zoom: 5,
                        zoomControl: true,
                        attributionControl: true,
                        scrollWheelZoom: true,
                        doubleClickZoom: true,
                        touchZoom: true,
                    });
                    
                    // 添加 CARTO 浅色瓦片图层（比 OSM 更稳定）
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
                        maxZoom: 19,
                        subdomains: 'abcd',
                    }).addTo(map);
                    
                    // 应用莫兰迪配色滤镜
                    const mapContainer = document.getElementById('container');
                    if (mapContainer) {
                        mapContainer.style.filter = 'sepia(8%) saturate(90%) brightness(102%)';
                    }
                    
                    console.log('Leaflet 地图加载完成');
                    resolve(map);
                    
                } catch (error) {
                    console.error('Map initialization error:', error);
                    reject(error);
                }
            });
        }
        
        // ========================================
        // 创建自定义爱心标记
        // ========================================
        function createHeartMarkerIcon(isActive = false) {
            const size = 40;
            const svgContent = `
                <svg viewBox="0 0 24 24" fill="var(--accent-primary)" class="heart-marker ${isActive ? 'active' : ''}">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            `;
            
            return L.divIcon({
                html: svgContent,
                className: 'leaflet-heart-marker',
                iconSize: [size, size],
                iconAnchor: [size/2, size/2],
                popupAnchor: [0, -size/2],
            });
        }
        
        // ========================================
        // 创建信息窗体内容
        // ========================================
        function createInfoWindowContent(travel) {
            const photo = travel.photo || 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600';
            return `
                <div class="custom-info-window">
                    <img src="${photo}" alt="${travel.name}" class="photo" onerror="this.src='https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600'">
                    <div class="body">
                        <div class="place">💕 ${travel.name}</div>
                        <div class="date">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            ${travel.date}
                        </div>
                        <div class="memory">${travel.memory}</div>
                    </div>
                </div>
            `;
        }
        
        // ========================================
        // 关闭信息窗体
        // ========================================
        function closeInfoWindow() {
            if (infoWindow) {
                infoWindow.close();
            }
            // 移除所有标记的active状态
            document.querySelectorAll('.heart-marker').forEach(el => {
                el.classList.remove('active');
            });
            currentMarkerId = null;
        }
        
        // ========================================
        // 添加足迹标记到地图
        // ========================================
        function addMarkers() {
            if (!map || travelsData.length === 0) return;
            
            // 创建信息窗体实例
            infoWindow = L.popup({
                closeButton: true,
                autoClose: true,
                closeOnClick: false,
                className: 'leaflet-popup-custom',
            });
            
            travelsData.forEach((travel, index) => {
                // 获取坐标 (travels.json中的格式是 [经度, 纬度]，Leaflet 用 [纬度, 经度])
                const lat = travel.location[1];
                const lng = travel.location[0];
                
                // 创建标记
                const marker = L.marker([lat, lng], {
                    icon: createHeartMarkerIcon(false),
                });
                
                // 鼠标点击标记事件
                marker.on('click', function() {
                    const travelItem = travelsData.find(t => t.id === travel.id);
                    
                    if (travelItem) {
                        // 打开信息窗体
                        infoWindow.setContent(createInfoWindowContent(travelItem));
                        infoWindow.setLatLng([lat, lng]).openOn(map);
                        
                        // 更新标记状态
                        updateMarkerState(travel.id);
                        
                        // 高亮时间轴项
                        highlightTimelineItem(travel.id);
                    }
                });
                
                // 标记添加到地图
                marker.addTo(map);
                
                // 保存标记引用
                markers.push({
                    id: travel.id,
                    marker: marker,
                    position: [lat, lng],
                });
            });
            
            // 如果只有一个标记，设置合适的缩放级别
            if (travelsData.length === 1) {
                map.setView(markers[0].position, 12);
            } else if (travelsData.length > 1) {
                // 自动调整视野以显示所有标记
                const group = L.featureGroup(markers.map(m => m.marker));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }
        
        // ========================================
        // 更新标记状态
        // ========================================
        function updateMarkerState(clickedId) {
            // 更新所有标记图标
            markers.forEach(m => {
                const isActive = m.id === clickedId;
                m.marker.setIcon(createHeartMarkerIcon(isActive));
            });
            
            currentMarkerId = clickedId;
        }
        
        // ========================================
        // 更新标记动画
        // ========================================
        function updateMarkerAnimation() {
            if (currentMarkerId) {
                updateMarkerState(currentMarkerId);
            }
        }
        
        // ========================================
        // 【核心功能】时间轴与地图联动
        // 点击时间轴中的地点，地图平滑移动到该地点的标记，并自动弹出信息窗体
        // ========================================
        function flyToLocation(travel) {
            if (!map) return;
            
            // 查找对应的标记
            const markerData = markers.find(m => m.id === travel.id);
            
            if (markerData) {
                // 更新标记状态
                updateMarkerState(travel.id);
                
                // 平滑移动地图到该位置
                map.setView(markerData.position, 12, { animate: true, duration: 0.5 });
                
                // 延迟打开信息窗体，等待地图移动完成
                setTimeout(() => {
                    infoWindow.setContent(createInfoWindowContent(travel));
                    infoWindow.setLatLng(markerData.position).openOn(map);
                }, 300);
                
                // 高亮时间轴项
                highlightTimelineItem(travel.id);
            }
        }
        
        // ========================================
        // 构建时间轴
        // ========================================
        function buildTimeline() {
            const timelineList = document.getElementById('timelineList');
            const timelineCount = document.getElementById('timelineCount');

            // 按日期降序排序
            const sortedData = [...travelsData].sort((a, b) => new Date(b.date) - new Date(a.date));

            timelineCount.textContent = `共 ${sortedData.length} 个足迹`;

            sortedData.forEach(travel => {
                const date = new Date(travel.date);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();

                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.dataset.id = travel.id;
                item.innerHTML = `
                    <div class="timeline-date">
                        <span class="timeline-year">${year}</span>
                        <span class="timeline-day">${day}</span>
                        <span class="timeline-month">${month}月</span>
                    </div>
                    <div class="timeline-content">
                        <div class="timeline-place">💕 ${travel.name}</div>
                        <div class="timeline-memo">${travel.memory}</div>
                    </div>
                `;

                // 点击时间轴项事件 - 触发地图移动和信息窗体显示
                item.addEventListener('click', () => {
                    // 移除所有时间轴项的active状态
                    document.querySelectorAll('.timeline-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    
                    // 地图移动到该位置并显示信息窗体
                    flyToLocation(travel);
                });

                timelineList.appendChild(item);
            });
        }
        
        // ========================================
        // 高亮时间轴项
        // ========================================
        function highlightTimelineItem(id) {
            document.querySelectorAll('.timeline-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.id === String(id)) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        }
        
        // ========================================
        // 移动端时间轴切换
        // ========================================
        function initMobileTimeline() {
            const toggle = document.getElementById('timelineToggle');
            const timeline = document.getElementById('timeline');

            toggle.addEventListener('click', () => {
                timeline.classList.toggle('open');
            });

            // 在移动端，点击地图区域关闭时间轴
            document.getElementById('container').addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    timeline.classList.remove('open');
                }
            });

            // 点击时间轴外部关闭
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 &&
                    !timeline.contains(e.target) &&
                    !toggle.contains(e.target)) {
                    timeline.classList.remove('open');
                }
            });
        }
        
        // ========================================
        // 初始化
        // ========================================
        async function init() {
            try {
                // 加载数据
                await loadTravelsData();

                // 构建时间轴
                buildTimeline();

                // 初始化移动端时间轴切换
                initMobileTimeline();

                // 初始化 Leaflet 地图
                await initMap();

                // 添加标记
                addMarkers();
                
            } catch (error) {
                console.error('Initialization error:', error);
            } finally {
                // 无论成功与否，1.5秒后隐藏loading
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    if (loading) {
                        loading.classList.add('hidden');
                    }
                }, 1500);
            }
        }

        // ========================================
        // 启动应用
        // ========================================
        init();

        // 监听 localStorage 变化，同步音乐状态
        window.addEventListener('storage', (e) => {
            if (e.key === 'musicPlaying' || e.key === 'musicCurrentTime') {
                const iframe = document.getElementById('musicIframe');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        type: 'syncMusic',
                        isPlaying: localStorage.getItem('musicPlaying') === 'true',
                        currentTime: parseFloat(localStorage.getItem('musicCurrentTime') || '0')
                    }, '*');
                }
            }
        });

        // 初始化编辑按钮
        initTravelsEdit();

        function initTravelsEdit() {
            const editBtn = document.getElementById('editBtn');
            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    if (isEditingMode) {
                        disableEditingMode();
                    } else {
                        openPasswordModal();
                    }
                });
            }
        }
    </script>

    <!-- 跨页面音乐播放器 -->
    <iframe src="music-player.html" style="position: fixed; bottom: 25px; left: 25px; width: 44px; height: 44px; border: none; z-index: 99999; background: transparent;" allow="autoplay; fullscreen" id="musicIframe" title="音乐播放器"></iframe>

    <!-- 编辑按钮 -->
    <button class="edit-toggle-btn hidden" id="editBtn" title="编辑内容">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
    </button>

    <script src="js/simple-edit.js"></script>
</body>
