<head>
    <meta charset="UTF-8">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="情书博物馆 · Love Story with You">
    <meta name="twitter:description" content="我们写下的每一封情书，都是爱的见证">
    <meta name="twitter:image" content="https://lily1756.github.io/love-anniversary/assets/icons/og-cover.jpg">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Dancing+Script:wght@500;600&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           全局基础样式
           ============================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); scroll-behavior: smooth; -webkit-overflow-scrolling: touch; max-width: 100vw; overflow-x: hidden; }
        *, *::before, *::after { max-width: 100vw; overflow-x: hidden; box-sizing: border-box; }
        img { max-width: 100%; height: auto; display: block; }

        :root {
            --bg: #FDFBF7;
            --bg-card: #ffffff;
            --bg-glass: rgba(255,255,255,0.85);
            --bg-glass-light: rgba(255,255,255,0.6);
            --border: rgba(196,168,162,0.25);
            --border-card: rgba(196,168,162,0.35);
            --text-primary: #4A4A4A;
            --text-secondary: #5A4A4A;
            --text-muted: #8A8A8A;
            --text-hint: #B0A0A0;
            --accent: #C4A8A2;
            --accent-hover: #B09090;
            --shadow-sm: 0 1px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 20px rgba(196,168,162,0.12);
            --shadow-lg: 0 12px 48px rgba(196,168,162,0.18);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --font-serif: 'Playfair Display', 'Ma Shan Zheng', 'Noto Serif SC', serif;
            --font-sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
            --font-title: 'Ma Shan Zheng', cursive;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        /* ── 图标样式 ── */
        .site-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            display: inline-block;
            flex-shrink: 0;
        }
        .site-icon-inline {
            width: 16px;
            height: 16px;
            vertical-align: middle;
            display: inline-block;
            margin-right: 6px;
            flex-shrink: 0;
        }
        .title-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }

        /* =============================================
           页面头部
           ============================================= */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-title {
            font-family: var(--font-title);
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 12px;
            color: var(--text-hint);
            font-family: 'Poppins', sans-serif;
        }

        /* =============================================
           顶部导航栏
           ============================================= */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 12px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .nav-btn:hover svg path,
        .nav-btn:hover svg rect,
        .nav-btn:hover svg circle {
            stroke: white;
        }

        .nav-btn svg {
            width: 18px;
            height: 18px;
        }

        /* =============================================
           操作栏
           ============================================= */
        .action-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .year-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .year-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-hint);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 36px;
        }

        .year-btn:hover {
            background: rgba(196,168,162,0.15);
        }

        .year-btn.active {
            background: var(--accent);
            color: white;
            font-weight: 500;
            border-color: var(--accent);
        }

        .search-box {
            flex: 1;
            min-width: 180px;
            max-width: 280px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-family: var(--font-sans);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input::placeholder {
            color: var(--text-hint);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(196,168,162,0.15);
        }

        .generate-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .generate-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .generate-btn:hover .site-icon-inline path {
            stroke: white;
        }

        /* =============================================
           情书列表
           ============================================= */
        .letter-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .letter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .letter-card:hover {
            box-shadow: var(--shadow-md);
            border-color: rgba(196,168,162,0.5);
        }

        .letter-date {
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            color: var(--text-hint);
            margin-bottom: 6px;
        }

        .letter-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .letter-excerpt {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .letter-read-more {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .letter-read-more::after {
            content: '→';
            transition: transform 0.2s ease;
        }

        .letter-card:hover .letter-read-more::after {
            transform: translateX(4px);
        }

        /* =============================================
           阅读详情弹窗
           ============================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            max-width: 640px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(240,232,232,1);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-left: 16px;
        }

        .modal-close:hover svg line {
            stroke: var(--text-muted);
        }

        .modal-date {
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            color: var(--text-hint);
            margin-bottom: 6px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .modal-text strong {
            color: var(--accent);
            font-weight: 600;
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            border-top: 1px solid rgba(240,232,232,1);
        }

        .modal-nav-btn {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .modal-nav-btn:hover {
            color: var(--accent-hover);
        }

        .modal-nav-btn.disabled {
            color: var(--text-hint);
            pointer-events: none;
        }

        .modal-counter {
            font-size: 12px;
            color: var(--text-hint);
            font-family: 'Poppins', sans-serif;
        }

        /* =============================================
           空状态
           ============================================= */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-hint);
        }

        .empty-state-icon {
            margin-bottom: 12px;
        }

        .empty-state-icon svg {
            width: 24px;
            height: 24px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* =============================================
           骨架屏
           ============================================= */
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .skeleton-line {
            background: linear-gradient(90deg, rgba(196,168,162,0.1) 25%, rgba(196,168,162,0.2) 50%, rgba(196,168,162,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 4px;
        }

        .skeleton-date {
            width: 100px;
            height: 12px;
            margin-bottom: 10px;
        }

        .skeleton-title {
            width: 70%;
            height: 16px;
            margin-bottom: 10px;
        }

        .skeleton-excerpt {
            width: 100%;
            height: 13px;
            margin-bottom: 6px;
        }

        .skeleton-excerpt:last-child {
            width: 60%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* =============================================
           电子书模态框
           ============================================= */
        .ebook-modal .modal-content {
            max-width: 1000px;
        }

        .ebook-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(240,232,232,1);
        }

        .ebook-title {
            font-family: var(--font-title);
            font-size: 20px;
            color: var(--text-primary);
        }

        .ebook-body {
            padding: 24px;
        }

        .year-selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .year-card {
            background: var(--bg-glass-light);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .year-card:hover:not(.disabled) {
            border-color: var(--accent);
            background: rgba(196,168,162,0.1);
        }

        .year-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .year-card-number {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .year-card-count {
            font-size: 12px;
            color: var(--text-hint);
        }

        /* =============================================
           加载动画
           ============================================= */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 12px;
            font-size: 14px;
        }

        /* =============================================
           打印样式
           ============================================= */
        @media print {
            @page {
                size: A4;
                margin: 2cm;
            }
            body {
                background: white;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .container, .top-bar, .action-bar, .modal-overlay, .loading-overlay, .nav-actions {
                display: none !important;
            }
            .print-book { display: block !important; }
            .print-letter-page {
                page-break-after: always;
                padding: 2cm 0;
            }
            .print-letter-date {
                font-family: 'Poppins', sans-serif;
                font-size: 12px;
                color: #888;
                margin-bottom: 1em;
            }
            .print-letter-title {
                font-family: 'Ma Shan Zheng', cursive;
                font-size: 20px;
                color: var(--accent);
                margin-bottom: 1em;
                padding-bottom: 0.5em;
                border-bottom: 1px solid #eee;
            }
            .print-letter-content {
                font-size: 14px;
                line-height: 1.9;
                color: #333;
                white-space: pre-wrap;
            }
        }

        .print-book { display: none; }

        /* =============================================
           编辑模式
           ============================================= */
        .edit-toggle-btn {
            position: fixed;
            right: 24px;
            bottom: 100px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            color: var(--accent);
        }

        .edit-toggle-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .edit-toggle-btn.hidden {
            display: none;
        }

        body.editing-mode .letter-card {
            cursor: pointer;
            transition: all 0.2s;
        }

        body.editing-mode .letter-card:hover {
            background: rgba(196,168,162,0.1);
        }

        body.editing-mode .letter-card .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: all 0.2s;
            z-index: 10;
        }

        body.editing-mode .letter-card:hover .delete-btn {
            opacity: 1;
        }

        /* 编辑模态框 */
        .letter-edit-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            padding: 20px;
        }

        .letter-edit-modal.open {
            display: flex;
        }

        .letter-edit-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 28px;
            width: min(500px, 100%);
            max-height: 80vh;
            overflow-y: auto;
        }

        .letter-edit-content h3 {
            margin: 0 0 20px;
            color: var(--text-primary);
            font-size: 18px;
            font-family: var(--font-title);
        }

        .letter-edit-content .form-group {
            margin-bottom: 16px;
        }

        .letter-edit-content .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .letter-edit-content .form-group input,
        .letter-edit-content .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-sans);
            transition: border-color 0.2s;
        }

        .letter-edit-content .form-group input:focus,
        .letter-edit-content .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .letter-edit-content .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .letter-edit-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .letter-edit-actions button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .letter-edit-actions .btn-cancel {
            background: #f0f0f0;
            color: #666;
            border: none;
        }

        .letter-edit-actions .btn-save {
            background: var(--accent);
            color: white;
            border: none;
        }

        /* =============================================
           移动端适配
           ============================================= */
        @media (max-width: 768px) {
            .container {
                padding: 16px 16px 80px;
            }

            .page-header {
                margin-bottom: 24px;
            }

            .page-title {
                font-size: 16px;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .year-filters {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 4px;
                gap: 6px;
            }

            .year-btn {
                flex-shrink: 0;
                padding: 8px 14px;
                font-size: 12px;
            }

            .search-box {
                max-width: none;
            }

            .generate-btn {
                width: 100%;
                justify-content: center;

                    <path d="M6.5 2H20V22H6.5C5.83696 22 5.20107 21.7366 4.73223 21.2678C4.26339 20.7989 4 20.163 4 19.5V4.5C4 3.83696 4.26339 3.20107 4.73223 2.73223C5.20107 2.26339 5.83696 2 6.5 2Z" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 跨页面音乐播放器 -->
    <iframe src="music-player.html" style="position: fixed; bottom: 20px; left: 20px; width: 44px; height: 44px; border: none; z-index: 9998; background: transparent;" allow="autoplay" id="musicIframe" title="音乐播放器"></iframe>

    <script src="js/simple-edit.js"></script>
    <script>
        // =============================================
        // 数据与状态
        // =============================================
        let diariesData = [];
        let filteredLetters = [];
        let availableYears = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentLetterIndex = 0;
        let editingLetterId = null;

        // =============================================
        // 加载数据
        // =============================================
        async function loadDiaries() {
            try {
                const resp = await fetch('diaries.json?t=' + Date.now());
                if (resp.ok) {
                    const json = await resp.json();
                    if (Array.isArray(json) && json.length > 0) {
                        diariesData = json;
                        return;
                    }
                }
            } catch {}

            // 演示数据
            diariesData = [
                { id: 'demo-1', date: '2025-05-17', title: '【2025】因缘际会在一起', content: '抱着还人情的心态吃完了一顿饭，原本以为会各回各家，相忘于江湖...\n\n也许是对亲密关系本能的恐惧，也许是意料之外的好感，亦或者只是从未正式思考过继续往下走的可能性。' },
                { id: 'demo-2', date: '2025-06-09', title: '【2025】我们要开始记录了', content: '喜欢跟志浩在一起的每一天，希望能开始认真记录每一份酸甜苦辣～谢谢志浩愿意陪我一起记录✌️' },
            ];
        }

        // =============================================
        // 初始化年份筛选
        // =============================================
        function initYearFilters() {
            const yearFilters = document.getElementById('yearFilters');
            // 移除除了"全部"以外的所有按钮
            yearFilters.querySelectorAll('.year-btn:not([data-year="all"])').forEach(b => b.remove());

            availableYears.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'year-btn';
                btn.dataset.year = year;
                btn.textContent = year;
                btn.addEventListener('click', () => filterByYear(year));
                yearFilters.appendChild(btn);
            });
        }

        function filterByYear(year) {
            currentFilter = year;
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.year === year || (year === 'all' && btn.dataset.year === 'all'));
            });
            applyFilters();
        }

        // =============================================
        // 搜索功能
        // =============================================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase().trim();
            applyFilters();
        });

        // =============================================
        // 应用筛选
        // =============================================
        function applyFilters() {
            filteredLetters = diariesData.filter(letter => {
                const letterYear = letter.date ? letter.date.split('-')[0] : '2025';
                const matchYear = currentFilter === 'all' || letterYear === currentFilter;
                const matchSearch = currentSearch === '' ||
                    (letter.title && letter.title.toLowerCase().includes(currentSearch)) ||
                    (letter.content && letter.content.toLowerCase().includes(currentSearch));
                return matchYear && matchSearch;
            });
            renderLettersList();
            updateStats();
        }

        // =============================================
        // 更新统计信息
        // =============================================
        function updateStats() {
            const totalLetters = diariesData.length;
            const totalWords = diariesData.reduce((sum, letter) => sum + (letter.content ? letter.content.length : 0), 0);
            document.getElementById('pageSubtitle').textContent = `共 ${totalLetters} 封情书，约 ${Math.round(totalWords / 100) * 100} 字`;
        }

        // =============================================
        // 渲染情书列表
        // =============================================
        function renderLettersList() {
            const listContainer = document.getElementById('letterList');
            listContainer.innerHTML = '';

            if (filteredLetters.length === 0) {
                if (currentSearch) {
                    listContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-text">没有找到匹配的情书</div>
                        </div>
                    `;
                } else if (currentFilter !== 'all') {
                    listContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z" fill="#C4A8A2"/>
                                </svg>
                            </div>
                            <div class="empty-state-text">这个年份还没有情书，期待你们的故事</div>
                        </div>
                    `;
                }
                return;
            }

            filteredLetters.forEach((letter, index) => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.style.position = 'relative';

                // 提取摘要（去除标题中的年份标签）
                let excerpt = letter.content || '';
                if (excerpt.length > 100) {
                    excerpt = excerpt.substring(0, 100) + '...';
                }

                card.innerHTML = `
                    ${document.body.classList.contains('editing-mode') ? '<button class="delete-btn" onclick="event.stopPropagation(); deleteLetter(\'' + letter.id + '\')">×</button>' : ''}
                    <div class="letter-date">${formatDisplayDate(letter.date)}</div>
                    <div class="letter-title">${letter.title || '无标题'}</div>
                    <div class="letter-excerpt">${excerpt}</div>
                    <span class="letter-read-more">阅读全文</span>
                `;

                card.addEventListener('click', () => openLetter(index));
                listContainer.appendChild(card);
            });
        }

        // =============================================
        // 格式化日期
        // =============================================
        function formatDisplayDate(dateStr) {
            if (!dateStr) return '未知日期';
            const parts = dateStr.split('-');
            if (parts.length >= 3) {
                return `${parts[0]}.${parts[1]}.${parts[2]}`;
            }
            return dateStr;
        }

        // 解析 Markdown 加粗
        function parseMarkdownBold(text) {
            if (!text) return '';
            return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }

        // =============================================
        // 阅读弹窗
        // =============================================
        function openLetter(index) {
            if (index < 0 || index >= filteredLetters.length) return;

            currentLetterIndex = index;
            const letter = filteredLetters[index];

            document.getElementById('modalDate').textContent = `第 ${index + 1} 封情书 · ${formatDisplayDate(letter.date)}`;
            document.getElementById('modalTitle').textContent = letter.title || '无标题';
            document.getElementById('modalText').innerHTML = parseMarkdownBold(letter.content || '');
            document.getElementById('modalCounter').textContent = `${index + 1} / ${filteredLetters.length}`;

            // 更新导航按钮状态
            document.getElementById('prevBtn').classList.toggle('disabled', index === 0);
            document.getElementById('nextBtn').classList.toggle('disabled', index === filteredLetters.length - 1);

            document.getElementById('readingModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeReadingModal() {
            document.getElementById('readingModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('modalClose').addEventListener('click', closeReadingModal);
        document.getElementById('readingModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('readingModal')) {
                closeReadingModal();
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentLetterIndex > 0) {
                openLetter(currentLetterIndex - 1);
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentLetterIndex < filteredLetters.length - 1) {
                openLetter(currentLetterIndex + 1);
            }
        });

        // =============================================
        // 电子书生成
        // =============================================
        document.getElementById('generateBtn').addEventListener('click', () => {
            renderYearSelector();
            document.getElementById('ebookModal').classList.add('active');
        });

        document.getElementById('ebookClose').addEventListener('click', () => {
            document.getElementById('ebookModal').classList.remove('active');
        });

        document.getElementById('ebookModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('ebookModal')) {
                document.getElementById('ebookModal').classList.remove('active');
            }
        });

        function renderYearSelector() {
            const grid = document.getElementById('yearSelectorGrid');
            grid.innerHTML = '';

            availableYears.forEach(year => {
                const lettersInYear = diariesData.filter(l => l.date && l.date.startsWith(year));
                const card = document.createElement('div');
                card.className = 'year-card' + (lettersInYear.length === 0 ? ' disabled' : '');
                card.innerHTML = `
                    <div class="year-card-number">${year}</div>
                    <div class="year-card-count">${lettersInYear.length} 封情书</div>
                `;
                if (lettersInYear.length > 0) {
                    card.addEventListener('click', () => generateEbook(year));
                }
                grid.appendChild(card);
            });
        }

        function generateEbook(year) {
            document.getElementById('ebookModal').classList.remove('active');
            showLoading();

            const yearLetters = diariesData
                .filter(l => l.date && l.date.startsWith(year))
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            setTimeout(() => {
                const printBook = document.getElementById('printBookContent');
                let html = '';

                yearLetters.forEach((letter, index) => {
                    const paragraphs = (letter.content || '')
                        .split('\n')
                        .filter(p => p.trim())
                        .map(p => `<p>${p}</p>`)
                        .join('');

                    html += `
                        <div class="print-letter-page">
                            <div class="print-letter-date">${formatDisplayDate(letter.date)}</div>
                            <div class="print-letter-title">${letter.title || '无标题'}</div>
                            <div class="print-letter-content">${parseMarkdownBold(paragraphs)}</div>
                        </div>
                    `;
                });

                printBook.innerHTML = html;
                hideLoading();
                window.print();
            }, 500);
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // =============================================
        // 编辑功能
        // =============================================
        function initEdit() {
            const editBtn = document.getElementById('editBtn');

            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    if (isEditingMode) {
                        disableEditingMode();
                    } else {
                        openPasswordModal();
                    }
                });
            }

            // 监听编辑模式变化
            const observer = new MutationObserver(() => {
                if (document.body.classList.contains('editing-mode')) {
                    if (editBtn) editBtn.classList.remove('hidden');
                    renderLettersList();
                } else {
                    if (editBtn) editBtn.classList.add('hidden');
                    renderLettersList();
                }
            });

            observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        }

        function showAddLetterModal() {
            editingLetterId = null;
            document.getElementById('letterEditTitle').textContent = '添加新情书';
            document.getElementById('letterDateInput').value = new Date().toISOString().split('T')[0];
            document.getElementById('letterTitleInput').value = '';
            document.getElementById('letterContentInput').value = '';
            document.getElementById('letterEditModal').classList.add('open');
        }

        function closeLetterEditModal() {
            document.getElementById('letterEditModal').classList.remove('open');
            editingLetterId = null;
        }

        function saveLetter() {
            const date = document.getElementById('letterDateInput').value;
            const title = document.getElementById('letterTitleInput').value.trim();
            const content = document.getElementById('letterContentInput').value.trim();

            if (!date || !title) {
                showToast('请填写日期和标题', 'error');
                return;
            }

            if (editingLetterId) {
                const letter = diariesData.find(l => l.id === editingLetterId);
                if (letter) {
                    letter.date = date;
                    letter.title = title;
                    letter.content = content;
                }
            } else {
                const newLetter = {
                    id: 'local-' + Date.now(),
                    date: date,
                    title: title,
                    content: content
                };
                diariesData.push(newLetter);
            }

            saveDiariesToLocal();
            closeLetterEditModal();
            applyFilters();

            availableYears = [...new Set(diariesData.map(l => l.date ? l.date.split('-')[0] : '2025'))].sort().reverse();
            initYearFilters();

            showToast(editingLetterId ? '已更新 💕' : '已添加 💕', 'success');
            editingLetterId = null;
        }

        function deleteLetter(id) {
            if (confirm('确定要删除这篇情书吗？')) {
                diariesData = diariesData.filter(l => l.id !== id);
                saveDiariesToLocal();
                applyFilters();

                availableYears = [...new Set(diariesData.map(l => l.date ? l.date.split('-')[0] : '2025'))].sort().reverse();
                initYearFilters();

                showToast('已删除', 'success');
            }
        }

        function saveDiariesToLocal() {
            localStorage.setItem('love_diaries_edit', JSON.stringify(diariesData));
        }

        // 加载本地编辑数据
        (function loadLocalDiaries() {
            try {
                const local = localStorage.getItem('love_diaries_edit');
                if (local) {
                    const parsed = JSON.parse(local);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        diariesData = parsed;
                    }
                }
            } catch {}
        })();

        // =============================================
        // 初始化
        // =============================================
        (async () => {
            await loadDiaries();

            availableYears = [...new Set(diariesData.map(l => l.date ? l.date.split('-')[0] : '2025'))].sort().reverse();

            initYearFilters();
            updateStats();
            applyFilters();
            initEdit();

            // 监听 localStorage 变化，同步音乐状态
            window.addEventListener('storage', (e) => {
                if (e.key === 'musicPlaying' || e.key === 'musicCurrentTime') {
                    const iframe = document.getElementById('musicIframe');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage({
                            type: 'syncMusic',
                            isPlaying: localStorage.getItem('musicPlaying') === 'true',
                            currentTime: parseFloat(localStorage.getItem('musicCurrentTime') || '0')
                        }, '*');
                    }
                }
            });
        })();
    </script>
</body>
</html>
