name: 自动同步滴答清单小作文

on:
  # 每天北京时间 08:00 自动同步（UTC 00:00）
  schedule:
    - cron: '0 0 * * *'

  # 也可以在 GitHub 网页上手动点击触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行同步脚本（通过 GitHub API 推送）
        env:
          DIDA_TOKEN: ${{ secrets.DIDA_TOKEN }}
          DIDA_PROJECT_ID: ${{ secrets.DIDA_PROJECT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python3 sync_diaries.py
